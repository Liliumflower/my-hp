        body{

        }
        a:link, a:hover, a:visited {
            color: #999;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        /* ヘッダーの設定 */
        .header {
            z-index: 100;
            padding: 30px 0;
            width: 100%;
        }
        .header-title {
            text-align: center;
            margin: 0 auto 20px;
        }

        /* ナビゲーション（英語＋日本語サブ） */
        .nav {
            max-width: 960px;

            background: #fff;

        }
        .nav-list {
            display: flex;

            margin: 0;
            list-style: none;
        }
        .nav-list > li {

        }
        .nav-list > li a {
            display: block;

            letter-spacing: 0.1em;
        }
        .nav-list > li a:hover {
            color: #bfaea6;
        }

            letter-spacing: 0.05em;
        }

        /* ハンバーガーメニュー（スマホ用） */
        @media screen and (min-width:961px) {
            #nav-drawer{ display:none; }
        }
        @media screen and (max-width:960px) {
            .nav{ display:none; }
            .header{
                padding: 20px 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 30px;
            }
            .header-title { margin: 0 0 0 20px; }
            #nav-drawer { position: relative; margin-right: 20px; }
            .nav-unshown { display:none; }
            #nav-open {
                display: inline-block;
                width: 30px;
                height: 22px;
                position: relative;
            }
            #nav-open span, #nav-open span:before, #nav-open span:after {
                position: absolute;
                height: 1px;
                width: 100%;
                background: #544D49;
                display: block;
                content: '';
                cursor: pointer;
            }
            #nav-open span:before { bottom: -8px; }
            #nav-open span:after { bottom: -16px; }
            #nav-close {
                display: none;
                position: fixed;
                z-index: 99;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.3);
                opacity: 0;
                transition: .3s ease-in-out;
            }
            #nav-content {
                overflow: auto;
                position: fixed;
                top: 0;
                left: 0;
                z-index: 9999;
                width: 80%;
                max-width: 300px;
                height: 100%;
                background: #fff;
                transition: .3s ease-in-out;
                transform: translateX(-105%);
            }
            #nav-input:checked ~ #nav-close { display: block; opacity: 1; }
            #nav-input:checked ~ #nav-content {
                transform: translateX(0%);
                box-shadow: 6px 0 25px rgba(0,0,0,.1);
            }
            .nav-drawerList{
                list-style: none;
                text-align: center;
                padding: 40px 0;
            }
            .nav-drawerList-item > a{
                display: block;
                padding: 15px;
                color: #544D49;
            }
        }
